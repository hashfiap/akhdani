{% extends "layout.html" %}
{% block content %}
<div class="card shadow">
    <div class="card-body">
        <h3>User Role Management</h3>
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Current Role</th>
                    <th>Change Role</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.username }}</td>
                    <td><span class="badge bg-secondary">{{ user.role }}</span></td>
                    <td>
                        {% if user.username != 'admin' %}
                        <form action="{{ url_for('change_role', id=user.id) }}" method="POST" class="d-flex gap-2">
                            <select name="role" class="form-select form-select-sm" style="width: 150px;">
                                <option value="PEGAWAI" {{ 'selected' if user.role == 'PEGAWAI' }}>PEGAWAI</option>
                                <option value="DIVISI-SDM" {{ 'selected' if user.role == 'DIVISI-SDM' }}>DIVISI-SDM</option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-primary">Update</button>
                        </form>
                        {% else %}
                        <small class="text-muted">System Admin (Locked)</small>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Back to Dashboard</a>
    </div>
</div>
{% endblock %}
