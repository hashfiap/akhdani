<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perdin Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">Akhdani Perdin</a>
            {% if session['user_id'] %}
            <div class="navbar-nav ms-auto">
                {% if session['role'] == 'ADMIN' %}
                    <a class="nav-link" href="{{ url_for('manage_users') }}">Manage Users</a>
                    <a class="nav-link" href="{{ url_for('master_kota') }}">Manage Cities</a>
                {% endif %}
                <span class="nav-link text-white">Hello, {{ session['username'] }} ({{ session['role'] }})</span>
                <a class="nav-link" href="{{ url_for('logout') }}">Logout</a>
            </div>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
